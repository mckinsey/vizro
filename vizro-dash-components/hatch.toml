[envs.changelog]
dependencies = ["scriv"]
detached = true
installer = "uv"
scripts = {add = "scriv create --add", collect = ["scriv collect --add", "- pre-commit run --files=CHANGELOG.md > /dev/null"]}

[envs.default]
dependencies = [
  "pre-commit",
  "dash[dev,testing]>=4,<5",  # provides dash-generate-components + dash_duo fixture
  "chromedriver-autoinstaller>=0.6.4",
  "pytest"
]
installer = "uv"

[envs.default.scripts]
example-cascader = "python examples/cascader_demo.py"
example-markdown = "python examples/markdown_demo.py"
generate-components = "npm run build"
lint = "pre-commit run {args} --all-files"
pip = '"{env:HATCH_UV}" pip {args}'
prep-release = [
  "hatch version release",
  "npm install --package-lock-only --legacy-peer-deps",
  "npm run build",
  "hatch run changelog:collect",
  "hatch run changelog:add",
  'echo "Now raise a PR to merge into main with title: [Release] Release of vizro-dash-components $(hatch version)"'
]
pypath = "python -c 'import sys; print(sys.executable)'"
test = "pytest tests --headless {args}"
