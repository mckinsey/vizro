# Human-editable data for generating docs/pages/components_compendium/index.html.
#
# To add a new component or action:
#   1. Add an entry to the relevant category below.
#   2. Add an image to assets/images/.
#   3. Run `hatch run compendium` to regenerate index.html.
#   4. Commit both this file and index.html.
#
# To regenerate index.html: hatch run compendium
# To check if index.html is up to date (used in CI): hatch run compendium-check

carousel_items:
  - title: Notifications
    image: assets/images/notifications.gif
    image_alt: Notifications
    description: |
      The <code>show_notification</code> action displays a temporary message to the user.
      <br />
      Notifications appear at the top-right of the screen and are customizable with options
      for content and styling.
    link_text: View Notifications
    link_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/notification-actions/

  - title: Controls in containers
    image: assets/images/controls_in_containers.gif
    image_alt: Controls in containers
    description: |
      The Container has a controls argument where you can define container-specific controls
      such as filters and parameters. Controls can only target components inside their own container.
    link_text: View controls in Container
    link_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/container/#add-controls-to-container

  - title: New action set_controls
    image: assets/images/cross_highlight.gif
    image_alt: Set controls
    description: |
      Configure interactions between graphs and tables, as is commonly done in business
      intelligence (BI) tools.
    link_text: View new Actions
    link_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/graph-table-actions/

categories:
  - id: components
    title: Components
    items:
      - id: graph
        name: Graph
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/graph/
        image: assets/images/charts.png
        image_alt: Bar chart visualization example
        highlight_lines: "10-16"
        code: |
          import vizro.plotly.express as px
          from vizro import Vizro
          import vizro.models as vm

          df = px.data.gapminder()

          page = vm.Page(
              title="Bar Chart Example",
              components=[
                  vm.Graph(
                      figure=px.bar(
                          df,
                          x="continent",
                          y="pop",
                          color="continent"
                      )
                  )
              ]
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: card
        name: Card
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/card/
        image: assets/images/card_component.png
        image_alt: Card component example
        highlight_lines: "7-14"
        code: |
          from vizro import Vizro
          import vizro.models as vm

          page = vm.Page(
              title="Vizro Card example",
              components=[
                  vm.Card(
                      text="""Lorem ipsum dolor sit amet,
                       consectetur adipiscing elit, sed do
                       eiusmod tempor incididunt ut labore
                       et dolore magna aliqua.""",
                      header="Card header",
                      footer="Card footer",
                  )
              ]
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: aggrid
        name: AgGrid
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/table/
        image: assets/images/aggrid.png
        image_alt: AG Grid table example
        highlight_lines: "11-13"
        code: |
          import vizro.plotly.express as px
          import vizro.models as vm
          from vizro import Vizro
          from vizro.tables import dash_ag_grid

          df = px.data.gapminder()

          page = vm.Page(
              title="Default Dash AG Grid",
              components=[
                  vm.AgGrid(
                      figure=dash_ag_grid(data_frame=df)
                  )
              ]
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: button
        name: Button
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/button/
        image: assets/images/buttons.png
        image_alt: Button variants example
        highlight_lines: "8-28"
        code: |
          from vizro import Vizro
          import vizro.models as vm

          page = vm.Page(
              title="Vizro buttons",
              layout=vm.Flex(direction="row"),
              components=[
                  vm.Button(
                      text="filled"
                  ),
                  vm.Button(
                      text="outlined",
                      variant="outlined"
                  ),
                  vm.Button(
                      text="plain",
                      variant="plain"
                  ),
                  vm.Button(
                      text="Click me!",
                      description="Start the process.",
                  ),
                  vm.Button(
                      text="Visit Google",
                      href="https://www.google.com",
                      icon="Link",
                      variant="outlined",
                  ),
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: figure
        name: Figure
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/figure/
        image: assets/images/kpi_reference_card.png
        image_alt: KPI reference card example
        highlight_lines: "17-25"
        code: |
          import pandas as pd
          from vizro import Vizro
          import vizro.models as vm
          from vizro.figures import kpi_card_reference

          df_kpi = pd.DataFrame(
              {
                  "Actual": [100, 200, 700],
                  "Reference": [100, 300, 500],
                  "Category": ["A", "B", "C"]
              }
          )

          page = vm.Page(
              title="KPI reference card",
              components=[
                  vm.Figure(
                      figure=kpi_card_reference(
                          data_frame=df_kpi,
                          value_column="Actual",
                          reference_column="Reference",
                          title="KPI reference with icon",
                          icon="Shopping Cart",
                      )
                  )
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: text
        name: Text
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/text/
        image: assets/images/text.png
        image_alt: Text component example
        highlight_lines: "8-15"
        code: |
          import vizro.plotly.express as px
          from vizro import Vizro
          import vizro.models as vm

          page = vm.Page(
              title="Text",
              components=[
                  vm.Text(
                      text="""
                          ## Lorem ipsum
                          Neque porro quisquam est qui
                          dolorem ipsum quia dolor sit
                          amet, consectetur adipisci.
                      """,
                  )
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: container
        name: Container
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/container/
        image: assets/images/container.png
        image_alt: Container component example
        highlight_lines: "11-24"
        code: |
          import vizro.plotly.express as px
          import vizro.models as vm
          from vizro import Vizro

          iris = px.data.iris()

          page = vm.Page(
              title="Containers",
              layout=vm.Grid(grid=[[0, 1]]),
              components=[
                  vm.Container(
                      title="Container with background color",
                      components=[
                          vm.Graph(
                              figure=px.scatter(
                                  iris,
                                  x="sepal_width",
                                  y="sepal_length",
                                  color="species"
                              )
                          )
                      ],
                      variant="filled",
                  ),
                  vm.Container(
                      title="Container with borders",
                      components=[
                          vm.Graph(
                              figure=px.box(
                                  iris,
                                  x="species",
                                  y="sepal_length",
                                  color="species"
                              )
                          )
                      ],
                      variant="outlined",
                  )
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: tabs
        name: Tabs
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/tabs/
        image: assets/images/tabs.gif
        image_alt: Tabs component example
        highlight_lines: "10-43"
        code: |
          import vizro.plotly.express as px
          from vizro import Vizro
          import vizro.models as vm

          gapminder = px.data.gapminder()

          page = vm.Page(
              title="Tabs",
              components=[
                  vm.Tabs(
                      title="Tabs Title",
                      tabs=[
                          vm.Container(
                              title="Tab I",
                              components=[
                                  vm.Graph(
                                      figure=px.bar(
                                          gapminder,
                                          title="Graph 1",
                                          x="continent",
                                          y="lifeExp",
                                          color="continent",
                                      ),
                                  ),
                              ],
                          ),
                          vm.Container(
                              title="Tab II",
                              components=[
                                  vm.Graph(
                                      figure=px.scatter(
                                          gapminder,
                                          title="Graph 3",
                                          x="gdpPercap",
                                          y="lifeExp",
                                          size="pop",
                                          color="continent",
                                      ),
                                  ),
                              ],
                          ),
                      ],
                  ),
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

  - id: layout
    title: Layout
    items:
      - id: grid
        name: Grid
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/layouts/#grid-layout
        image: assets/images/grid_layout.png
        image_alt: Grid layout example
        highlight_lines: "6-11"
        code: |
          import vizro.models as vm
          from vizro import Vizro

          page = vm.Page(
              title="Grid layout",
              layout=vm.Grid(
                  grid=[
                      [0, 1, 3, 4],
                      [2, 2, 3, 4]
                  ]
              ),
              components=[
                  vm.Card(text="Card 1"),
                  vm.Card(text="Card 2"),
                  vm.Card(text="Card 3"),
                  vm.Card(text="Card 4"),
                  vm.Card(text="Card 5"),
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: flex
        name: Flex
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/layouts/#flex-layout
        image: assets/images/flex_layout.png
        image_alt: Flex layout example
        highlight_lines: "9-13"
        code: |
          import vizro.models as vm
          from vizro import Vizro
          import vizro.plotly.express as px

          tips = px.data.tips()

          page = vm.Page(
              title="Flex layout",
              layout=vm.Flex(
                  direction="row",
                  gap="40px",
                  wrap=True
              ),
              components=[
                  vm.Graph(
                      figure=px.violin(
                          tips,
                          y="tip",
                          x="day",
                          color="day"
                      )
                  ) for i in range(3)
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

  - id: controls
    title: Controls
    items:
      - id: filter
        name: Filter
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/filters/
        image: assets/images/filters.gif
        image_alt: Filter control example
        highlight_lines: "20"
        code: |
          import vizro.plotly.express as px
          from vizro import Vizro
          import vizro.models as vm

          iris = px.data.iris()

          page = vm.Page(
              title="Filter",
              components=[
                  vm.Graph(
                      figure=px.scatter(
                          iris,
                          x="sepal_length",
                          y="petal_width",
                          color="species",
                      ),
                  ),
              ],
              controls=[
                  vm.Filter(column="species"),
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: parameter
        name: Parameter
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/parameters/
        image: assets/images/parameter.gif
        image_alt: Parameter control example
        highlight_lines: "22-31"
        code: |
          import vizro.plotly.express as px
          from vizro import Vizro
          import vizro.models as vm

          iris = px.data.iris()

          page = vm.Page(
              title="Parameter",
              components=[
                  vm.Graph(
                      id="scatter_chart",
                      figure=px.scatter(
                          iris,
                          title="My scatter chart",
                          x="sepal_length",
                          y="petal_width",
                          color="species"
                      ),
                  ),
              ],
              controls=[
                  vm.Parameter(
                      targets=["scatter_chart.title"],
                      selector=vm.Dropdown(
                          options=[
                              "My scatter chart",
                              "A better title!"
                          ],
                          multi=False,
                      ),
                  ),
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - type: selectors_group
        id: selectors
        name: Selectors
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/selectors/
        description: |
          The Filter or the Parameter model accept the selector argument, where a selector
          model can be entered to choose how the user should input their choices for the
          respective models.
        selectors:
          - id: dropdown
            name: Dropdown
            image: assets/images/dropdown.png
            image_alt: Dropdown selector
            code: |
              controls=[
                  vm.Filter(
                      column="species",
                      selector=vm.Dropdown(
                          title="Species"
                      )
                  )
              ]

          - id: checklist
            name: Checklist
            image: assets/images/checklist.png
            image_alt: Checklist selector
            code: |
              controls=[
                  vm.Filter(
                      column="species",
                      selector=vm.Checklist(
                          title="Species"
                      )
                  )
              ]

          - id: radioitems
            name: RadioItems
            image: assets/images/radioitems.png
            image_alt: RadioItems selector
            code: |
              controls=[
                  vm.Filter(
                      column="species",
                      selector=vm.RadioItems(
                          title="Species"
                      )
                  )
              ]

          - id: slider
            name: Slider
            image: assets/images/slider.png
            image_alt: Slider selector
            code: |
              controls=[
                  vm.Filter(
                      column="size",
                      selector=vm.Slider(
                          title="Slider (Tips - size)",
                          step=1,
                          value=2
                      ),
                  ),
              ]

          - id: rangeslider
            name: RangeSlider
            image: assets/images/rangeslider.png
            image_alt: RangeSlider selector
            code: |
              controls=[
                  vm.Filter(
                      column="lifeExp",
                      selector=vm.RangeSlider(
                          title="Range Slider (Gapminder - lifeExp)",
                          step=1,
                          marks=None
                      ),
                  )
              ]

          - id: datepicker
            name: DatePicker
            image: assets/images/datepicker.png
            image_alt: DatePicker selector
            code: |
              controls=[
                  vm.Filter(
                      column="date",
                      selector=vm.DatePicker(
                          title="Date Picker (Stocks - date)",
                          range=False,
                      )
                  ),
              ]

          - id: daterangepicker
            name: DateRangePicker
            image: assets/images/daterangepicker.png
            image_alt: DateRangePicker selector
            code: |
              controls=[
                  vm.Filter(
                      column="date",
                      selector=vm.DatePicker(
                          title="Date Picker (Stocks - date)",
                      )
                  ),
              ]

          - id: switch
            name: Switch
            image: assets/images/switch.png
            image_alt: Switch selector
            code: |
              controls=[
                  vm.Filter(
                      column="species",
                      selector=vm.Switch(title="Is Europe?"),
                  )
              ]

  - id: actions
    title: Actions
    items:
      - id: export-data
        name: Export data
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/data-actions/
        image: assets/images/export_data.gif
        image_alt: Export data action example
        highlight_lines: "16"
        description: |
          Use the <b>export_data</b> action to download all data shown on a dashboard page,
          including graphs, tables, and figures. Exported files reflect filters and dynamic
          parameters applied to the page, but not interactions made directly within charts
          or tables (such as zooming or in-chart filters).
        code: |
          import vizro.plotly.express as px
          import vizro.actions as va
          import vizro.models as vm
          from vizro import Vizro

          df = px.data.iris()

          page = vm.Page(
              title="Actions - export_data",
              components=[
                  vm.Graph(
                      figure=px.histogram(df, x="sepal_length")
                  ),
                  vm.Button(
                      text="Export data",
                      actions=va.export_data()
                  ),
              ],
              controls=[vm.Filter(column="species")],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: set-control
        name: "Graph & table interactions"
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/graph-table-actions/
        image: assets/images/cross_filter_from_graph_1.gif
        image_alt: Graph and table interactions example
        highlight_lines: "16-18"
        description: |
          In Vizro, interactions between components are enabled through an explicitly defined
          intermediate control. Cross-filtering, cross-parameter updates, and cross-highlighting
          all use the <b>set_control</b> action, providing a flexible and powerful way to link
          components.
        code: |
          import vizro.plotly.express as px
          import vizro.actions as va
          import vizro.models as vm
          from vizro import Vizro
          from vizro.tables import dash_ag_grid

          tips = px.data.tips()

          page = vm.Page(
              title="Cross-filter from table to graph",
              components=[
                  vm.AgGrid(
                      title="""Click on a row to use that row's
                      sex to filter graph""",
                      figure=dash_ag_grid(tips),
                      actions=va.set_control(
                          control="sex_filter", value="sex"
                      ),
                  ),
                  vm.Graph(
                      id="tips_graph",
                      figure=px.histogram(tips, x="tip")
                  ),
              ],
              controls=[
                  vm.Filter(
                      id="sex_filter",
                      column="sex",
                      targets=["tips_graph"]
                  )
              ],
          )
          Vizro().build(vm.Dashboard(pages=[page])).run()

      - id: notifications
        name: Notifications
        docs_url: https://vizro.readthedocs.io/en/stable/pages/user-guides/notification-actions/
        image: assets/images/notifications.gif
        image_alt: Notifications action example
        highlight_lines: "19-23"
        description: |
          The <b>show_notification</b> action displays a temporary message in the top-right of
          the screen to inform users about successes, warnings, errors, information, or loading
          states. Notifications can be customized with a title, text, and styling options such
          as variants and icons.
        code: |
          import vizro.plotly.express as px
          import vizro.actions as va
          import vizro.models as vm
          from vizro import Vizro

          df = px.data.iris()

          page = vm.Page(
              title="Export with notification",
              layout=vm.Flex(),
              components=[
                  vm.Graph(
                      figure=px.histogram(df, x="sepal_length")
                  ),
                  vm.Button(
                      text="Export data",
                      actions=[
                          va.export_data(),
                          va.show_notification(
                              text="Data exported successfully!",
                              variant="success",
                              icon="download",
                          ),
                      ],
                  ),
              ],
          )

          Vizro().build(vm.Dashboard(pages=[page])).run()

