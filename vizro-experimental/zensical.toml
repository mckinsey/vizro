[project]
site_name = "Vizro-Experimental"
site_url = "https://vizro.readthedocs.io/projects/vizro-experimental"
site_description = "Vizro-Experimental documentation"
site_dir = "site"
docs_dir = "docs"
use_directory_urls = true

# Nav is grouped per feature. As new experimental features land they get a sibling
# group at the top level (e.g. an "App layout" section beside "Chat") plus their own
# pages/<feature>/ folder and pages/API-reference/<feature>.md page.
nav = [
  {"Vizro-Experimental" = "index.md"},
  {"Chat" = [
    {"Chat component" = [
      {"How-to guides" = [
        {"Chat component" = "pages/chat/chat-component.md"},
        {"Use a real LLM" = "pages/chat/use-llm.md"},
        {"Stream text responses" = "pages/chat/streaming-chat.md"},
        {"Render Dash components" = "pages/chat/mixed-content.md"},
        {"Add example questions" = "pages/chat/example-questions.md"},
        {"Add file upload" = "pages/chat/file-upload.md"},
        {"Combine features" = "pages/chat/combine-features.md"}
      ]},
      {"API reference" = "pages/chat/api-reference.md"}
    ]},
    {"Chat popup" = [
      {"How to add a chat popup" = "pages/chat/chat-popup.md"},
      {"API reference" = "pages/chat/popup-api-reference.md"}
    ]}
  ]},
  {"Vizro" = "https://vizro.readthedocs.io"},
  {"Vizro-AI" = "https://vizro.readthedocs.io/projects/vizro-ai/"},
  {"Vizro-MCP" = "https://vizro.readthedocs.io/projects/vizro-mcp/"}
]

# This infers the version number of the latest release of whole repo, so we're hiding it for sub-packages in extra.css
repo_url = "https://github.com/mckinsey/vizro/tree/main/vizro-experimental"
repo_name = "mckinsey/vizro-experimental"

extra_css = ["stylesheets/extra.css"]

# -------------------------
# theme
# -------------------------
[project.theme]
language = "en"
variant = "classic"
favicon = "images/favicon/favicon.png"
features = [
  "header.autohide",
  "navigation.path",
  "navigation.expand",
  "navigation.instant",
  "navigation.indexes",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "search.suggest",
  "search.highlight",
  "content.tabs.link",
  "content.code.annotation",
  "content.code.copy",
  "content.code.annotate"
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Google sans"
code = "Source Code Pro"

[project.theme.icon]
repo = "fontawesome/brands/github"

# -------------------------
# markdown_extensions
# -------------------------
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.footnotes]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]

[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

# mkdocs-pycafe is intentionally not configured: our code samples import
# ``vizro_experimental.chat``, which py.cafe cannot install until the package is
# published to PyPI. Re-enable the ``python`` custom_fence with
# ``requirements = "vizro-experimental"`` once that lands.

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

# -------------------------
# plugins
# -------------------------
[project.plugins.search]

[project.plugins.autorefs]

[project.plugins.mkdocstrings]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = false
docstring_style = "google"
merge_init_into_class = true
docstring_section_style = "list"
separate_signature = true
show_root_heading = true

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = true
warn_unknown_params = false

[project.plugins.git-revision-date-localized]
enable_creation_date = false

# Zensical does not yet support strict/validation settings (as of 0.0.28).
# When supported, add:
# validation:
#   omitted_files: warn
#   absolute_links: warn
#   unrecognized_links: warn
#   anchors: warn
