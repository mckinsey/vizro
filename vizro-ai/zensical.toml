[project]
site_name = "Vizro-AI"
site_url = "https://vizro.readthedocs.io/projects/vizro-ai"
site_dir = "site"
docs_dir = "docs"

nav = [
  {"Vizro-AI" = "index.md"},
  {"Tutorials" = [
    {"Chart generation" = "pages/tutorials/quickstart.md"}
  ]},
  {"How-to guides" = [
    {"FUNDAMENTALS" = [
      {"Install Vizro-AI" = "pages/user-guides/install.md"},
      {"Model setup" = "pages/user-guides/customize-vizro-ai.md"}
    ]},
    {"CHART AGENT" = [
      {"Usage and advanced options" = "pages/user-guides/advanced-options.md"},
      {"Add Vizro-AI charts to a Vizro dashboard" = "pages/user-guides/add-generated-chart-usecase.md"}
    ]}
  ]},
  {"API Reference" = "pages/API-reference/vizro-ai.md"},
  {"Explanation" = [
    {"FAQs" = "pages/explanation/faq.md"},
    {"Disclaimer" = "pages/explanation/disclaimer.md"},
    {"Safeguard code execution" = "pages/explanation/safeguard.md"},
    {"Safety in Vizro-AI" = "pages/explanation/safety-in-vizro-ai.md"}
  ]},
  {"Vizro" = "https://vizro.readthedocs.io"},
  {"Vizro-MCP" = "https://vizro.readthedocs.io/projects/vizro-mcp/"}
]

# This infers the version number of the latest release of whole repo, so we're hiding it for sub-packages in extra.css
repo_url = "https://github.com/mckinsey/vizro/tree/main/vizro-ai"
repo_name = "mckinsey/vizro-ai"

extra_css = ["stylesheets/extra.css"]

# -------------------------
# theme
# -------------------------
[project.theme]
language = "en"
variant = "classic"
favicon = "images/favicon/favicon.png"
features = [
  "navigation.instant",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.sections",
  "navigation.tracking",
  "search.suggest",
  "search.highlight",
  "content.tabs.link",
  "content.code.annotation",
  "content.code.copy",
  "content.code.annotate"
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Google sans"
code = "Source Code Pro"

[project.theme.icon]
repo = "fontawesome/brands/github"

# -------------------------
# markdown_extensions
# -------------------------
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.footnotes]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]

[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

[[project.markdown_extensions.pymdownx.superfences.custom_fences]]
name = "python"
class = "highlight"
validator = "mkdocs_pycafe.validator"
format = {object = "mkdocs_pycafe.formatter", kwds = {type = "vizro", requirements = "vizro==0.1.53"}}

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

# -------------------------
# plugins
# -------------------------
[project.plugins.search]

[project.plugins.autorefs]

[project.plugins.mkdocstrings]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = false
docstring_style = "google"
merge_init_into_class = true
docstring_section_style = "table"
separate_signature = true
show_root_heading = true

[project.plugins.mkdocstrings.handlers.python.options.docstring_options]
ignore_init_summary = true
warn_unknown_params = false

[project.plugins.git-revision-date-localized]
enable_creation_date = false

# MkDocs-only: hooks (docs/overrides/canonical_tag.py) - not supported in Zensical

# Zensical does not yet support strict/validation settings (as of 0.0.28).
# When supported, add:
# validation:
#   omitted_files: warn
#   absolute_links: warn
#   unrecognized_links: warn
#   anchors: warn
