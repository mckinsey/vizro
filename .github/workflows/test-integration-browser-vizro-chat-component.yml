name: Browser integration tests for vizro_chat_component

defaults:
  run:
    working-directory: vizro-experimental

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches:

env:
  PYTHONUNBUFFERED: 1
  FORCE_COLOR: 1
  PYTHON_VERSION: "3.13"

jobs:
  test-integration-browser-vizro-chat-component:
    name: test-integration-browser-vizro-chat-component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Hatch
        run: pip install hatch

      - name: Install Playwright and browser
        run: |
          hatch run pip install playwright
          hatch run playwright install --with-deps chromium

      - name: Run browser integration tests
        run: hatch run test-integration-browser
