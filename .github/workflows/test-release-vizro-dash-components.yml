name: Test release vizro-dash-components to TestPyPI

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: vizro-dash-components

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"

jobs:
  build-publish-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Hatch
        run: pip install hatch

      - name: Generate Python components from TypeScript source
        run: hatch run generate-components

      - name: Build package
        run: hatch build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: vizro-dash-components/dist
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.VIZRO_DASH_COMPONENTS_TEST_PYPI_TOKEN }}
