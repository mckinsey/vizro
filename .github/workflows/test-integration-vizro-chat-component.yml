name: integration vizro_chat_component tests

defaults:
  run:
    working-directory: vizro-experimental

permissions:
  contents: read

on:
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: 1
  FORCE_COLOR: 1
  PYTHON_VERSION: "3.13"

jobs:
  test-integration-vizro-chat-component:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Hatch
        run: pip install hatch
      - name: Install Playwright and browser
        run: |
          hatch run pip install playwright
          hatch run playwright install --with-deps chromium
      - name: Run tests
        run: |
          hatch run test-integration-vizro-chat-component
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_API_BASE }}

      - name: Create artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: http-requests-artifacts
          path: |
            /home/runner/work/vizro/vizro/vizro-experimental/*.png
